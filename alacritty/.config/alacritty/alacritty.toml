#import = [
#  "~/.config/alacritty/catppuccin-mocha.toml"
#]

[env]
TERM = "xterm-256color"

[font]
size = 10.0

[font.bold]
family = "MesloLGS Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "MesloLGS Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "MesloLGS Nerd Font Mono"
style = "Italic"

[font.normal]
family = "MesloLGS Nerd Font Mono"
style = "Regular"


[window]
padding = { x = 9, y = 9 }
#dynamic_padding = true
opacity = 1.0

[colors]
primary = { background = "#333333", foreground = "#d4be98"}
